# E2E Testing Profile
# Uses H2 in-memory database for repeatable, isolated tests
# Start with: mvn spring-boot:run -Dspring-boot.run.profiles=e2e

spring:
  application:
    name: myrmec-control-engine

  datasource:
    url: jdbc:h2:mem:e2edb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 9090

# JWT Configuration - longer tokens for E2E debugging
jwt:
  secret: e2e-test-secret-key-for-integration-tests-256-bits
  access-token-minutes: 60
  refresh-token-days: 1

# Admin User Bootstrap - auto-create admin for E2E tests
myrmec:
  admin:
    email: admin@e2e-test.local
    password: E2eTest@123!
    name: E2E Test Admin
  encryption:
    key: e2e-test-encryption-key-32-bytes!
    previous-keys: ""

# API Documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging - verbose for debugging E2E issues
logging:
  level:
    ai.myrmec: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: INFO
